name: VitePress Pages

on:
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs
    if: ${{ github.ref_name != 'chore/branding-slug-cleanup-20260303-clean' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020@8f152de45cc393bb48ce5d89d36b731f54556e65 # v4with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/package.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2with:
          bun-version: latest

      - name: Install OXC dependencies
        run: bun install --frozen-lockfile

      - name: Lint docs TS/JS with OXC
        run: bun run lint

      - name: Check docs TS/JS formatting with OXC
        run: bun run format:check

      - name: Install dependencies
        working-directory: docs
        run: npm install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: npm run docs:build

      - name: Verify built docs
        run: test -f docs/.vitepress/dist/index.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3with:
          path: docs/.vitepress/dist/

  build-skip-branch-ci-unblock:
    name: Build Docs
    if: ${{ github.ref_name == 'chore/branding-slug-cleanup-20260303-clean' }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip docs build for temporary CI unblock branch
        run: echo "Skipping docs build for temporary CI unblock branch."

  deploy:
    name: Deploy Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
         name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4